<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/icon.png" rel="shortcut icon" type="image/x-icon" />
    <title>XuanKen Music Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://kit-pro.fontawesome.com/releases/v7.2.0/css/pro.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap');
        
        :root {
            --accent-color: #000000;
            --bg-color: #fcfcfc;
            --border-color: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: #000;
            user-select: none;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        .player-container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .header-section {
            padding: 40px 24px 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            transition: border-color 0.8s ease;
        }

        .top-right-action {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 110;
        }

        .top-left-action {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 110;
        }

        .btn-icon {
            font-size: 1.2rem;
            cursor: pointer;
            color: #666;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .btn-icon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .btn-icon:active::before {
            width: 100%;
            height: 100%;
        }

        .btn-icon:hover {
            transform: scale(1.05);
            background: rgba(0, 0, 0, 0.05);
        }

        .btn-icon:active {
            transform: scale(0.92);
        }

        .btn-icon.active {
            color: #000;
            background: rgba(0, 0, 0, 0.08);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .play-btn {
            background: #000;
            color: #fff !important;
            width: 55px;
            height: 55px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background: #1a1a1a;
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .top-right-action .btn-icon,
        .top-left-action .btn-icon {
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(4px);
        }

        .top-right-action .btn-icon:hover,
        .top-left-action .btn-icon:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: rotate(5deg) scale(1.05);
        }

        .top-right-action .btn-icon:active,
        .top-left-action .btn-icon:active {
            transform: rotate(0deg) scale(0.92);
        }

        .album-art {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #eee;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 5px solid #fff;
            transition: box-shadow 0.3s ease;
        }

        .album-art:hover {
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: rotate 15s linear infinite;
            animation-play-state: paused;
            transition: transform 0.3s ease;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-info-main {
            width: 100%;
        }

        .song-title {
            display: block;
            color: #000;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            text-overflow: clip;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            cursor: default;
            max-width: 100%;
            line-height: 1.3;
            padding-bottom: 2px;
        }
        
        .song-title::-webkit-scrollbar {
            height: 2px;
            background: transparent;
        }
        
        .artist-name {
            display: block;
            color: #777;
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .lyric-container {
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0 10px;
            position: relative;
            overflow: visible;
        }

        .current-lyric {
            color: #333;
            font-weight: 400;
            text-align: center;
            opacity: 1;
            transition: opacity 0.2s ease-in-out;
            white-space: nowrap;
            display: inline-block;
            transform-origin: center center;
        }

        .controls-bar {
            padding: 24px;
            background: #fff;
        }

        .progress-wrapper {
            margin-bottom: 20px;
        }

        .progress-bar-container {
            height: 6px;
            background: var(--border-color);
            cursor: pointer;
            position: relative;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: background-color 0.8s ease;
            overflow: hidden;
        }

        .progress-filled {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            border-radius: 10px;
            transition: width 0.1s linear, background-color 0.8s ease;
            position: relative;
        }

        .progress-filled::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-bar-container:hover .progress-filled::after {
            opacity: 1;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #999;
            font-weight: 400;
        }

        .main-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
        }

        .main-actions .btn-icon {
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .main-actions .btn-icon:active {
            transform: scale(0.9);
        }

        .playlist {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 1);
            z-index: 150;
            overflow-y: auto;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .playlist.active { transform: translateY(0); }

        .playlist-header {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 160;
        }

        .close-playlist {
            font-size: 1.2rem;
            cursor: pointer;
            color: #000;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .close-playlist:hover {
            background: rgba(0, 0, 0, 0.05);
            transform: rotate(90deg);
        }

        .close-playlist:active {
            transform: rotate(90deg) scale(0.9);
        }

        .playlist-title {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        #playlist-content {
            flex: 1;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .song-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background: rgba(0, 0, 0, 0.03);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .song-item:hover::before {
            width: 100%;
        }

        .song-item:hover {
            padding-left: 25px;
        }

        .song-item:active {
            transform: scale(0.98);
        }

        .song-item.active {
            background: var(--bg-color);
            border-left: 5px solid var(--accent-color);
        }
        
        .song-item .item-title {
            font-size: 0.85rem;
            line-height: 1.3;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        #interaction-hint {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        #interaction-hint .loader {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #toast-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            backdrop-filter: blur(8px);
            white-space: nowrap;
            font-weight: 500;
        }

        .timer-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 500;
            display: none;
            width: 90%;
            max-width: 320px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            text-align: center;
        }
        .timer-modal.show {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        .timer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 499;
            display: none;
            backdrop-filter: blur(2px);
        }

        .timer-modal input {
            transition: all 0.2s ease;
        }

        .timer-modal input:focus {
            transform: scale(1.02);
            box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
        }

        .timer-modal button {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .timer-modal button:active {
            transform: scale(0.97);
        }

        @media (max-width: 480px) {
            .header-section {
                padding: 30px 16px 25px 16px;
            }
            .album-art {
                width: 140px;
                height: 140px;
            }
            .controls-bar {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="toast-msg"></div>

    <div id="interaction-hint">
        <div class="loader mb-4 border-4 border-gray-200 border-t-black rounded-full w-12 h-12 animate-spin"></div>
        <p class="font-bold text-2xl text-center px-4 tracking-tighter">XUANKEN MUSIC OFFICIAL</p>
        <p class="text-gray-500 text-sm mt-2">✨ Chạm để bắt đầu nghe nhạc ✨</p>
    </div>

    <div class="player-container">
        <div class="header-section">
            <div class="top-left-action">
                <div class="btn-icon" id="open-timer-btn" title="Hẹn giờ tắt">
                    <i class="far fa-clock"></i>
                </div>
            </div>

            <div class="top-right-action">
                <div class="btn-icon" id="list-btn" title="Danh sách bài hát">
                    <i class="fas fa-list"></i>
                </div>
            </div>
            
            <div class="album-art">
                <img id="current-art" src="https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/logoofficial.png" alt="Art">
            </div>
            <div class="song-info-main">
                <span class="song-title" id="current-title">Sẵn sàng</span>
                <span class="artist-name" id="current-artist">XuanKen Official</span>
                <div class="lyric-container" id="lyric-container">
                    <div class="current-lyric" id="lyric-text">✨ Chọn bài hát để phát ✨</div>
                </div>
            </div>
        </div>

        <div class="controls-bar">
            <div class="progress-wrapper">
                <div class="progress-bar-container" id="progress-area">
                    <div class="progress-filled" id="progress-bar"></div>
                </div>
                <div class="time-info">
                    <span id="time-current">00:00</span>
                    <span id="time-total">00:00</span>
                </div>
            </div>

            <div class="main-actions">
                <div class="btn-icon" id="shuffle-btn" title="Phát ngẫu nhiên">
                    <i class="fas fa-random"></i>
                </div>
                <div class="btn-icon" id="prev-btn" title="Bài trước">
                    <i class="fas fa-step-backward"></i>
                </div>
                <div class="btn-icon play-btn" id="play-pause-btn" title="Phát / Tạm dừng">
                    <i class="fas fa-play" id="play-icon"></i>
                </div>
                <div class="btn-icon" id="next-btn" title="Bài tiếp">
                    <i class="fas fa-step-forward"></i>
                </div>
                <div class="btn-icon" id="repeat-btn" title="Lặp lại 1 bài">
                    <i class="fas fa-redo-alt"></i>
                </div>
            </div>
        </div>

        <div class="playlist" id="playlist">
            <div class="playlist-header" id="playlist-header">
                <div class="close-playlist" id="close-playlist-btn">
                    <i class="fas fa-times"></i>
                </div>
                <div class="playlist-title">🎵 DANH SÁCH BÀI HÁT 🎵</div>
                <div style="width: 40px;"></div> 
            </div>
            <div id="playlist-content"></div>
        </div>
    </div>

    <div id="timer-overlay" class="timer-overlay"></div>
    <div id="timer-modal" class="timer-modal">
        <i class="far fa-clock text-3xl mb-2 text-black"></i>
        <h3 class="text-lg font-bold uppercase tracking-widest">HẸN GIỜ TẮT</h3>
        <p id="timer-status" class="text-[10px] text-gray-400 font-bold uppercase mt-1">Chưa đặt hẹn giờ</p>
        <div class="mt-5 flex flex-col gap-3">
            <input type="number" id="timer-minutes" placeholder="Nhập số phút..." class="border p-3 rounded-lg text-center font-bold outline-none focus:border-black">
            <button id="start-timer-btn" class="bg-black text-white font-bold py-3 rounded-lg text-xs uppercase tracking-widest transition-all hover:bg-gray-800">BẮT ĐẦU</button>
            <button id="cancel-timer-btn" class="text-red-500 font-bold text-[10px] uppercase tracking-widest transition-all hover:text-red-600">HỦY HẸN GIỜ</button>
        </div>
        <button id="close-timer-modal" class="mt-4 text-gray-400 text-[10px] font-bold uppercase transition-all hover:text-gray-600">Đóng</button>
    </div>

    <audio id="audio-player" preload="auto" crossorigin="anonymous" playsinline></audio>

        function createShuffledArray() {
            const arr = [...Array(songs.length).keys()];

                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;

            }
        }
        
        const observer = new ResizeObserver(() => autoScaleSongTitle());
        if (songTitleEl) observer.observe(songTitleEl.parentElement);
        window.addEventListener('resize', () => autoScaleSongTitle());
        
        function showToast(msg) {
            toast.innerText = msg;
            toast.style.opacity = "1";
            setTimeout(() => { toast.style.opacity = "0"; }, 3000);
        }

        function getRandomPastel() {
            const h = Math.floor(Math.random() * 360);
            return { bg: `hsl(${h}, 70%, 94%)`, accent: `hsl(${h}, 60%, 40%)` };
        }

        function scrollToActiveTop() {
            const activeItem = document.querySelector('.song-item.active');
            if (activeItem) {
                const headerHeight = playlistHeader.offsetHeight;
                const targetScroll = activeItem.offsetTop - headerHeight;
                playlistOverlay.scrollTop = targetScroll;
            }
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { if (document.visibilityState === 'visible') wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }
        function releaseWakeLock() { if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; } }

        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                const song = songs[index];
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.name,
                    artist: 'XuanKen Official',
                    album: 'XuanKen Music Collection',
                    artwork: [{ src: 'https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/logoofficial.png', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => prevSong());
                navigator.mediaSession.setActionHandler('nexttrack', () => handleNextAction());
            }
        }

        function adjustLyricFontSize(text) {
            lyricDisplay.style.transform = 'none';
            lyricDisplay.style.fontSize = '16px';
            lyricDisplay.innerText = text;
            
            const containerWidth = lyricContainer.clientWidth;
            if (containerWidth <= 0) return;
            
            const textWidth = lyricDisplay.scrollWidth;
            
            if (textWidth > containerWidth - 20) {
                const scale = (containerWidth - 20) / textWidth;
                const finalScale = Math.max(scale, 0.5);
                lyricDisplay.style.transform = `scale(${finalScale})`;
                lyricDisplay.style.fontSize = '16px';
            } else {
                lyricDisplay.style.transform = 'none';
                let currentFontSize = 16;
                const maxFontSize = Math.min(20, 16 + (containerWidth - textWidth) / 10);
                while (lyricDisplay.scrollWidth < containerWidth - 30 && currentFontSize < maxFontSize) {
                    currentFontSize += 1;
                    lyricDisplay.style.fontSize = currentFontSize + 'px';
                }
            }
        }

        function formatTime(sec) { if (!sec || isNaN(sec)) return "00:00"; let m = Math.floor(sec / 60); let s = Math.floor(sec % 60); return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; }
        function parseLRC(text) { const lines = text.split('\n'); const result = []; const timeReg = /\[(\d+):(\d+\.\d+)\]/; lines.forEach(line => { const match = timeReg.exec(line); if (match) result.push({ time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: line.replace(timeReg, '').trim() }); }); return result; }
        
        async function fetchLyricWithFallback(lrc1, lrc2) {
            const urls = [lrc1, lrc2].filter(url => url && url.trim() !== "");
            for (let i = 0; i < urls.length; i++) {
                try { const res = await fetch(urls[i]); if (res.ok) return parseLRC(await res.text()); } catch(e) { console.error(e); }
            }
            return [];
        }

        async function loadSong(i) {
            if (isChanging) return;
            isChanging = true;
            index = i;
            const song = songs[index];
            songTitleEl.innerText = song.name;
            autoScaleSongTitle();
            const colors = getRandomPastel();
            document.documentElement.style.setProperty('--bg-color', colors.bg);
            document.documentElement.style.setProperty('--accent-color', colors.accent);
            audio.pause();
            audio.src = song.audio1;
            audio.load();
            lyrics = [];
            lastLyric = "";
            adjustLyricFontSize("Đang tải lời bài hát...");
            progressBar.style.width = '0%';
            lyrics = await fetchLyricWithFallback(song.lrc1, song.lrc2);
            if (lyrics.length === 0) adjustLyricFontSize("<i class="fa-solid fa-microphone-lines"> XuanKen Official <i class="fa-solid fa-microphone-lines">");
            renderPlaylist();
            updateMediaSession();
            if (playlistOverlay.classList.contains('active')) setTimeout(scrollToActiveTop, 100);
            isChanging = false;
        }

        audio.onerror = () => { 
            const song = songs[index]; 
            const currentSrc = audio.src; 
            if (currentSrc === song.audio1 && song.audio2 && song.audio2.trim() !== "") { 
                showToast("Đang thử link dự phòng..."); 
                audio.src = song.audio2; 
                audio.load(); 
                audio.play().catch(e=>console.error(e)); 
            } else showToast("Lỗi: Không thể phát bài hát!"); 
        };
        
        function togglePlay() { if (audio.paused) audio.play().catch(()=>{}); else audio.pause(); }
        
        function changeSong(i) { 
            loadSong(i).then(() => audio.play().catch(()=>{})); 
        }
        
        function selectSongFromList(i) { 
            playlistOverlay.classList.remove('active'); 
            changeSong(i); 
        }
        
        function handleNextAction() { 
            if (isRepeatOne) { 
                audio.currentTime = 0; 
                audio.play().catch(e => { setTimeout(() => audio.play(), 50); });
            } else { 
                let next;
                if (isShuffle) {
                    next = getNextShuffleIndex(index);
                } else {
                    next = (index + 1) % songs.length;
                }
                changeSong(next); 
            } 
        }
        
        function prevSong() { 
            if (isRepeatOne) {
                audio.currentTime = 0;
                audio.play().catch(()=>{});
                return;
            }
            let prev;
            if (isShuffle) {
                prev = getPrevShuffleIndex();
            } else {
                prev = (index - 1 + songs.length) % songs.length;
            }
            changeSong(prev); 
        }
        
        audio.ontimeupdate = () => { 
            const cur = audio.currentTime; 
            const dur = audio.duration; 
            if (dur) { 
                progressBar.style.width = (cur / dur * 100) + '%'; 
                document.getElementById('time-current').innerText = formatTime(cur); 
                document.getElementById('time-total').innerText = formatTime(dur); 
            } 
            if (lyrics.length > 0) { 
                const active = lyrics.findLast(l => cur >= l.time); 
                if (active && lastLyric !== active.text) { 
                    lastLyric = active.text; 
                    adjustLyricFontSize(active.text); 
                } 
            }
            if (isRepeatOne && dur && (dur - cur) <= 0.1 && !isLoopingHandled && dur > 0) {
                isLoopingHandled = true;
                audio.currentTime = 0;
                audio.play().catch(e => { setTimeout(() => audio.play(), 20); });
            }
            if (cur > 0 && dur && (dur - cur) > 0.2) isLoopingHandled = false;
        };
        
        audio.onended = () => {
            if (isRepeatOne) {
                isLoopingHandled = true;
                audio.currentTime = 0;
                setTimeout(() => { audio.play().catch(e => { audio.load(); setTimeout(() => audio.play(), 50); }); }, 10);
            } else { handleNextAction(); }
        };
        
        audio.onplay = () => { 
            isPlaying = true; playIcon.className = 'fas fa-pause'; art.style.animationPlayState = 'running'; requestWakeLock(); 
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing"; 
        };
        
        audio.onpause = () => { 
            isPlaying = false; playIcon.className = 'fas fa-play'; art.style.animationPlayState = 'paused'; releaseWakeLock(); 
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused"; 
        };
        
        const initIdx = getInitialShuffleIndex();
        index = initIdx;
        
        hint.onclick = () => { hint.style.display = 'none'; changeSong(index); };
        document.getElementById('play-pause-btn').onclick = togglePlay;
        document.getElementById('next-btn').onclick = handleNextAction;
        document.getElementById('prev-btn').onclick = prevSong;
        document.getElementById('list-btn').onclick = (e) => { e.stopPropagation(); playlistOverlay.classList.add('active'); setTimeout(scrollToActiveTop, 450); };
        document.getElementById('close-playlist-btn').onclick = () => playlistOverlay.classList.remove('active');
        
        shuffleBtn.onclick = function() { 
            isShuffle = !isShuffle; 
            this.classList.toggle('active', isShuffle);
            if (isShuffle) {
                resetShuffleState();
                showToast("Đã bật xáo trộn thông minh (không lặp bài liên tục)");
            } else {
                showToast("Đã tắt xáo trộn, phát tuần tự");
            }
        };
        
        repeatBtn.onclick = function() { isRepeatOne = !isRepeatOne; this.classList.toggle('active', isRepeatOne); isLoopingHandled = false; showToast(isRepeatOne ? "Đã bật lặp lại 1 bài" : "Đã tắt lặp lại 1 bài"); };
        document.getElementById('progress-area').onclick = (e) => { if (!audio.duration) return; const rect = e.currentTarget.getBoundingClientRect(); audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration; };
        
        let sleepTimerId = null, remain = 0;
        function toggleTimerModal() { 
            if (timerModal.classList.contains('show')) { timerModal.classList.remove('show'); setTimeout(() => timerOverlay.style.display = 'none', 300); } 
            else { timerOverlay.style.display = 'block'; setTimeout(() => timerModal.classList.add('show'), 10); } 
        }
        const openTimerBtn = document.getElementById('open-timer-btn');
        const timerModal = document.getElementById('timer-modal');
        const timerOverlay = document.getElementById('timer-overlay');
        const timerStatus = document.getElementById('timer-status');
        const timerInput = document.getElementById('timer-minutes');
        const startTimerBtn = document.getElementById('start-timer-btn');
        const cancelTimerBtn = document.getElementById('cancel-timer-btn');
        const closeTimerBtn = document.getElementById('close-timer-modal');
        openTimerBtn.onclick = toggleTimerModal; closeTimerBtn.onclick = toggleTimerModal; timerOverlay.onclick = toggleTimerModal;
        
        function setTimer() { 
            const mins = parseInt(timerInput.value); 
            if (!mins || mins <= 0) { showToast("Vui lòng nhập số phút hợp lệ!"); return; } 
            cancelTimer(); remain = mins * 60; updateTimerUI(); 
            sleepTimerId = setInterval(() => { remain--; updateTimerUI(); if (remain <= 0) { audio.pause(); cancelTimer(); showToast("Đã tự động tắt nhạc theo hẹn giờ."); } }, 1000); 
            toggleTimerModal(); openTimerBtn.classList.add('active'); showToast(`Đã hẹn giờ tắt nhạc sau ${mins} phút.`); 
        }
        function cancelTimer() { if (sleepTimerId) clearInterval(sleepTimerId); sleepTimerId = null; remain = 0; timerStatus.innerText = "Chưa đặt hẹn giờ"; openTimerBtn.classList.remove('active'); }
        function updateTimerUI() { if (remain > 0) { const m = Math.floor(remain / 60); const s = remain % 60; timerStatus.innerText = `Sẽ tắt sau: ${m} phút ${s} giây`; } }
        startTimerBtn.onclick = setTimer; cancelTimerBtn.onclick = () => { cancelTimer(); showToast("Đã hủy hẹn giờ tắt nhạc."); };
        
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        function renderPlaylist() { 
            const list = document.getElementById('playlist-content'); 
            list.innerHTML = songs.map((s, i) => `<div class="song-item ${i === index ? 'active' : ''}" onclick="selectSongFromList(${i})"><div class="flex-1"><div class="item-title text-sm uppercase font-bold break-words pr-2">${escapeHtml(s.name)}</div><div class="text-xs text-gray-500"><i class="fa-solid fa-microphone-lines"></i> XuanKen Official</div></div>${i === index ? '<i class="fa-sharp fa-solid fa-music text-xs text-black"></i>' : ''}</div>`).join(''); 
        }
        
        document.addEventListener('visibilitychange', async () => { if (document.visibilityState === 'visible' && !audio.paused) await requestWakeLock(); });
        window.onload = () => { isShuffle = true; shuffleBtn.classList.add('active'); renderPlaylist(); autoScaleSongTitle(); if ('mediaSession' in navigator) updateMediaSession(); };
        window.onresize = () => { if (lastLyric) adjustLyricFontSize(lastLyric); autoScaleSongTitle(); };
        window.selectSongFromList = selectSongFromList;
    </script>
</body>
</html>
