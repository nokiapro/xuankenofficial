<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap');
        
        :root {
            --accent-color: #000000;
            --bg-color: #fcfcfc;
            --border-color: #f0f0f0;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: #000;
            user-select: none;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        .player-container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .header-section {
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            transition: border-color 0.8s ease;
        }

        .top-right-action {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 110;
        }

        .album-art {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #eee;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 5px solid #fff;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: rotate 15s linear infinite;
            animation-play-state: paused;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-info-main {
            width: 100%;
        }

        .song-title {
            display: block;
            color: #000;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            display: block;
            color: #777;
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .lyric-container {
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            width: 100%;
            padding: 0 10px;
        }

        .current-lyric {
            color: #333;
            font-size: 1.15rem;
            font-weight: 400;
            text-align: center;
            opacity: 1;
            transition: opacity 0.1s ease-in-out, font-size 0.2s ease;
            white-space: nowrap;
            display: inline-block;
            max-width: 100%;
        }

        .controls-bar {
            padding: 24px;
            background: #fff;
        }

        .progress-wrapper {
            margin-bottom: 20px;
        }

        .progress-bar-container {
            height: 6px;
            background: var(--border-color);
            cursor: pointer;
            position: relative;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: background-color 0.8s ease;
        }

        .progress-filled {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            border-radius: 10px;
            transition: width 0.1s linear, background-color 0.8s ease;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #999;
            font-weight: 400;
        }

        .main-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-icon {
            font-size: 1.2rem;
            cursor: pointer;
            color: #666;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: 0.2s;
        }

        .btn-icon:active { transform: scale(0.9); }
        .btn-icon.active { color: #000; background: rgba(0,0,0,0.05); }

        .play-btn {
            background: #000;
            color: #fff !important;
            width: 55px;
            height: 55px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .playlist {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
            overflow-y: auto;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 60px;
            scroll-behavior: smooth;
        }

        .playlist.active { transform: translateY(0); }

        .close-playlist {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #000;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }

        .song-item.active {
            background: var(--bg-color);
            border-left: 5px solid var(--accent-color);
        }

        #interaction-hint {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>

        function adjustLyricFontSize(text) {
            lyricDisplay.style.fontSize = '1.15rem';
            lyricDisplay.innerText = text;
            
            const maxWidth = lyricContainer.clientWidth - 20;
            let currentFontSize = 1.15;
            
            while (lyricDisplay.offsetWidth > maxWidth && currentFontSize > 0.7) {
                currentFontSize -= 0.05;
                lyricDisplay.style.fontSize = currentFontSize + 'rem';
            }
        }

        function formatTime(sec) {
            if (!sec || isNaN(sec)) return "00:00";
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function parseLRC(text) {
            const lines = text.split('\n');
            const result = [];
            const timeReg = /\[(\d+):(\d+\.\d+)\]/;
            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    result.push({
                        time: parseInt(match[1]) * 60 + parseFloat(match[2]),
                        text: line.replace(timeReg, '').trim()
                    });
                }
            });
            return result;
        }

        async function fetchLyric(lrcObj) {
            try {
                const res = await fetch(lrcObj.link1);
                if (res.ok) return parseLRC(await res.text());
            } catch (e) {
                console.warn("LRC Link 1 hỏng, thử Link 2...");
            }

            if (lrcObj.link2) {
                try {
                    const res = await fetch(lrcObj.link2);
                    if (res.ok) return parseLRC(await res.text());
                } catch (e) {
                    console.warn("LRC Link 2 cũng hỏng.");
                }
            }
            return [];
        }

        async function loadSong(i) {
            if (isChanging) return;
            isChanging = true;
            index = i;
            usingBackupAudio = false;
            const song = songs[index];
            
            document.getElementById('current-title').innerText = song.title;
            const themeColor = song.color || "#fcfcfc";
            const accentColor = song.accent || "#000000";
            document.documentElement.style.setProperty('--bg-color', themeColor);
            document.documentElement.style.setProperty('--accent-color', accentColor);

            audio.pause();
            audio.src = song.audio.link1;
            audio.load();
            
            lyrics = [];
            lastLyric = "";
            adjustLyricFontSize("Đang tải dữ liệu...");
            progressBar.style.width = '0%';

            lyrics = await fetchLyric(song.lrc);
            
            if (lyrics.length === 0) adjustLyricFontSize("XuanKen Official");
            renderPlaylist();
            updateMediaSession();
            
            setTimeout(scrollToActive, 200);
            isChanging = false;
        }

        audio.onerror = () => {
            const song = songs[index];
            if (!usingBackupAudio && song.audio.link2) {
                usingBackupAudio = true;
                console.log("Audio Link 1 hỏng, tự động chuyển sang Link 2...");
                audio.src = song.audio.link2;
                audio.load();
                audio.play().catch(() => {});
            } else if (usingBackupAudio || !song.audio.link2) {
                adjustLyricFontSize("Không thể phát bài hát này");
            }
        };

        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(e => console.log("Play error:", e));
            } else {
                audio.pause();
            }
        }

        function changeSong(i) {
            loadSong(i).then(() => {
                audio.play().catch(e => console.log("Auto-play error:", e));
            });
        }

        function selectSongFromList(i) {
            playlistOverlay.classList.remove('active');
            changeSong(i);
        }

        function handleNextAction() {
            if (isRepeatOne) {
                audio.currentTime = 0;
                audio.play();
            } else {
                let next;
                if (isShuffle) {
                    do { next = Math.floor(Math.random() * songs.length); } while (next === index && songs.length > 1);
                } else {
                    next = (index + 1) % songs.length;
                }
                changeSong(next);
            }
        }

        function prevSong() {
            let prev = isShuffle ? Math.floor(Math.random() * songs.length) : (index - 1 + songs.length) % songs.length;
            changeSong(prev);
        }

        audio.onplay = () => {
            isPlaying = true;
            playIcon.className = 'fas fa-pause';
            art.style.animationPlayState = 'running';
        };

        audio.onpause = () => {
            isPlaying = false;
            playIcon.className = 'fas fa-play';
            art.style.animationPlayState = 'paused';
        };

        audio.ontimeupdate = () => {
            const cur = audio.currentTime;
            const dur = audio.duration;
            if (dur) {
                progressBar.style.width = (cur / dur * 100) + '%';
                document.getElementById('time-current').innerText = formatTime(cur);
                document.getElementById('time-total').innerText = formatTime(dur);
            }
            if (lyrics.length > 0) {
                const active = lyrics.findLast(l => cur >= l.time);
                if (active && lastLyric !== active.text) {
                    lastLyric = active.text;
                    adjustLyricFontSize(active.text);
                }
            }
        };

        audio.onended = handleNextAction;

        hint.onclick = () => {
            hint.style.display = 'none';
            changeSong(index);
        };

        document.getElementById('play-pause-btn').onclick = togglePlay;
        document.getElementById('next-btn').onclick = handleNextAction;
        document.getElementById('prev-btn').onclick = prevSong;

        document.getElementById('list-btn').onclick = (e) => {
            e.stopPropagation();
            playlistOverlay.classList.add('active');
        };
        
        document.getElementById('close-playlist-btn').onclick = () => playlistOverlay.classList.remove('active');
        
        shuffleBtn.onclick = function() {
            isShuffle = !isShuffle;
            this.classList.toggle('active', isShuffle);
        };

        repeatBtn.onclick = function() {
            isRepeatOne = !isRepeatOne;
            this.classList.toggle('active', isRepeatOne);
        };

        document.getElementById('progress-area').onclick = (e) => {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        function renderPlaylist() {
            const list = document.getElementById('playlist-content');
            list.innerHTML = songs.map((s, i) => `
                <div class="song-item ${i === index ? 'active' : ''}" onclick="selectSongFromList(${i})">
                    <div class="flex-1">
                        <div class="item-title text-sm uppercase font-bold">${s.title}</div>
                        <div class="text-xs text-gray-500">XuanKen Official</div>
                    </div>
                    ${i === index ? '<i class="fas fa-volume-up text-xs"></i>' : ''}
                </div>
            `).join('');
        }

        window.onload = () => {
            isShuffle = true;
            shuffleBtn.classList.add('active');
            renderPlaylist();
        };
        
        window.onresize = () => {
            if (lastLyric) adjustLyricFontSize(lastLyric);
        };
    </script>
</body>
</html>
