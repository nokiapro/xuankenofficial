<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/icon.png" rel="shortcut icon" type="image/x-icon" />
    <title>XuanKen Music Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="toast-msg"></div>

    <div id="interaction-hint">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
            <svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="vinylGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#1e1b4b"/>
                        <stop offset="100%" stop-color="#4c1d95"/>
                    </linearGradient>
                    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#c084fc"/>
                        <stop offset="100%" stop-color="#8b5cf6"/>
                    </linearGradient>
                    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#e879f9"/>
                        <stop offset="100%" stop-color="#d946ef"/>
                    </linearGradient>
                    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#e879f9"/>
                        <stop offset="100%" stop-color="#3b82f6"/>
                    </linearGradient>
                    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#f0abfc"/>
                        <stop offset="50%" stop-color="#c084fc"/>
                        <stop offset="100%" stop-color="#f0abfc"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2.5" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <filter id="textGlow">
                        <feGaussianBlur stdDeviation="1.5" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <path id="textPath" d="M 70,70 m -54,0 a 54,54 0 1,1 108,0 a 54,54 0 1,1 -108,0"/>
                    <path id="textPathInner" d="M 70,70 m -48,0 a 48,48 0 1,1 96,0 a 48,48 0 1,1 -96,0"/>
                </defs>
                <style>
                    @keyframes rotateVinyl {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }}
                    @keyframes rotateText {
                        0% { stroke-dashoffset: 0; }
                        100% { stroke-dashoffset: -340; }}
                    @keyframes floatNote {
                        0%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
                        25% { transform: translate(10px, -12px) rotate(12deg); opacity: 0.8; }
                        50% { transform: translate(0, -18px) rotate(0deg); opacity: 0.5; }
                        75% { transform: translate(-10px, -12px) rotate(-12deg); opacity: 0.8; }}
                    @keyframes bounce {
                        0%, 100% { transform: scaleY(1); }
                        50% { transform: scaleY(0.3); }}
                    @keyframes pulseRing {
                        0% { stroke-dashoffset: 280; stroke-opacity: 0.8; }
                        50% { stroke-opacity: 0.2; }
                        100% { stroke-dashoffset: 0; stroke-opacity: 0.8; }}
                    @keyframes shimmer {
                        0% { background-position: -200% 0; }
                        100% { background-position: 200% 0; }}
                    .vinyl { animation: rotateVinyl 3s linear infinite; transform-origin: 70px 70px; }
                    .ring { animation: pulseRing 2s ease-in-out infinite; }
                    .note { animation: floatNote 2s ease-in-out infinite; transform-origin: 70px 70px; }
                    .note2 { animation: floatNote 2.5s ease-in-out infinite reverse; transform-origin: 70px 70px; animation-delay: 0.8s; }
                    .bar1 { animation: bounce 0.8s ease-in-out infinite; transform-origin: center bottom; }
                    .bar2 { animation: bounce 0.8s ease-in-out 0.15s infinite; transform-origin: center bottom; }
                    .bar3 { animation: bounce 0.8s ease-in-out 0.3s infinite; transform-origin: center bottom; }
                    .bar4 { animation: bounce 0.8s ease-in-out 0.1s infinite; transform-origin: center bottom; }
                    .bar5 { animation: bounce 0.8s ease-in-out 0.25s infinite; transform-origin: center bottom; }
                    .bar6 { animation: bounce 0.8s ease-in-out 0.4s infinite; transform-origin: center bottom; }
                    .text-path { animation: rotateText 8s linear infinite; }
                </style>

  <circle cx="70" cy="70" r="62" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.15"/>
  <circle class="ring" cx="70" cy="70" r="62" fill="none" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="390" stroke-dashoffset="300" stroke-linecap="round"/>

  <text font-family="'Segoe UI', 'Poppins', Arial, sans-serif" font-size="11" font-weight="bold" fill="url(#textGrad)" letter-spacing="3" filter="url(#textGlow)">
    <textPath href="#textPath" startOffset="0%" class="text-path">✦ XUANKEN OFFICIAL ✦ XUANKEN OFFICIAL ✦</textPath>
  </text>

  <text font-family="'Segoe UI', 'Poppins', Arial, sans-serif" font-size="8" font-weight="bold" fill="#a855f7" letter-spacing="2" opacity="0.7">
    <textPath href="#textPathInner" startOffset="0%" class="text-path" style="animation-duration: 12s;">• MUSIC • STUDIO • PRODUCER •</textPath>
  </text>

  <g class="vinyl">
    <circle cx="70" cy="70" r="48" fill="url(#vinylGrad)" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="70" cy="70" r="40" fill="none" stroke="#2e1065" stroke-width="0.8" stroke-opacity="0.6"/>
    <circle cx="70" cy="70" r="33" fill="none" stroke="#2e1065" stroke-width="0.8" stroke-opacity="0.6"/>
    <circle cx="70" cy="70" r="26" fill="none" stroke="#2e1065" stroke-width="0.8" stroke-opacity="0.6"/>
    <circle cx="70" cy="70" r="19" fill="none" stroke="#2e1065" stroke-width="0.8" stroke-opacity="0.6"/>
    <circle cx="70" cy="70" r="12" fill="none" stroke="#2e1065" stroke-width="0.8" stroke-opacity="0.6"/>
    <circle cx="70" cy="70" r="7" fill="#a855f7" stroke="#d8b4fe" stroke-width="1.5"/>
    <circle cx="70" cy="70" r="3" fill="#f0abfc"/>
  </g>

  <g transform="translate(70, 80)">
    <rect class="bar1" x="-28" y="-16" width="4.5" height="20" rx="2" fill="url(#barGrad1)" filter="url(#glow)"/>
    <rect class="bar2" x="-20" y="-25" width="4.5" height="29" rx="2" fill="url(#barGrad2)" filter="url(#glow)"/>
    <rect class="bar3" x="-12" y="-32" width="4.5" height="36" rx="2" fill="url(#barGrad1)" filter="url(#glow)"/>
    <rect class="bar4" x="-4" y="-22" width="4.5" height="26" rx="2" fill="url(#barGrad2)" filter="url(#glow)"/>
    <rect class="bar5" x="4" y="-28" width="4.5" height="32" rx="2" fill="url(#barGrad1)" filter="url(#glow)"/>
    <rect class="bar6" x="12" y="-18" width="4.5" height="22" rx="2" fill="url(#barGrad2)" filter="url(#glow)"/>
    <rect class="bar1" x="20" y="-12" width="4.5" height="16" rx="2" fill="url(#barGrad1)" filter="url(#glow)"/>
  </g>

  <g filter="url(#glow)">
    <g class="note">
      <circle cx="96" cy="28" r="5" fill="url(#noteGrad)"/>
      <rect x="99" y="23" width="3" height="14" rx="1.5" fill="url(#noteGrad)"/>
      <path d="M99 23 L109 19.5 L109 25.5 L99 28 Z" fill="#e879f9"/>
    </g>
    <g class="note2">
      <circle cx="38" cy="35" r="4.5" fill="#c084fc"/>
      <rect x="41" y="30" width="2.5" height="12" rx="1.25" fill="#c084fc"/>
      <path d="M41 30 L50 27 L50 32.5 L41 35 Z" fill="#a855f7"/>
    </g>
  </g>

  <circle cx="70" cy="70" r="65" fill="none" stroke="url(#noteGrad)" stroke-width="0.8" stroke-opacity="0.4">
    <animate attributeName="r" values="65;70;65" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;0.08;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="70" cy="70" r="2" fill="#f0abfc" opacity="0.8">
    <animate attributeName="r" values="2;8;2" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
            <p class="font-bold text-2xl text-center px-4 tracking-tighter mt-6">XUANKEN MUSIC OFFICIAL</p>
            <p class="text-gray-500 text-sm mt-2">✨ Chạm để bắt đầu nghe nhạc ✨</p>
        </div>
    </div>

    <div class="player-container">
        <div class="header-section">
            <div class="top-left-action">
                <div class="btn-icon" id="open-timer-btn" title="Hẹn giờ tắt">
                    <i class="far fa-clock"></i>
                </div>
            </div>

            <div class="top-right-action">
                <div class="btn-icon" id="list-btn" title="Danh sách bài hát">
                    <i class="fas fa-list"></i>
                </div>
            </div>
            
            <div class="album-art">
                <img id="current-art" src="https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/logoofficial.png" alt="Art">
            </div>
            <div class="song-info-main">
                <span class="song-title" id="current-title">Sẵn sàng</span>
                <span class="artist-name" id="current-artist">XuanKen Official</span>
                <div class="lyric-container" id="lyric-container">
                    <div class="current-lyric" id="lyric-text">✨ Chọn bài hát để phát ✨</div>
                </div>
            </div>
        </div>

        <div class="controls-bar">
            <div class="progress-wrapper">
                <div class="progress-bar-container" id="progress-area">
                    <div class="progress-filled" id="progress-bar"></div>
                </div>
                <div class="time-info">
                    <span id="time-current">00:00</span>
                    <span id="time-total">00:00</span>
                </div>
            </div>

            <div class="main-actions">
                <div class="btn-icon" id="shuffle-btn" title="Phát ngẫu nhiên">
                    <i class="fas fa-random"></i>
                </div>
                <div class="btn-icon" id="prev-btn" title="Bài trước">
                    <i class="fas fa-step-backward"></i>
                </div>
                <div class="btn-icon play-btn" id="play-pause-btn" title="Phát / Tạm dừng">
                    <i class="fas fa-play" id="play-icon"></i>
                </div>
                <div class="btn-icon" id="next-btn" title="Bài tiếp">
                    <i class="fas fa-step-forward"></i>
                </div>
                <div class="btn-icon" id="repeat-btn" title="Lặp lại 1 bài">
                    <i class="fas fa-redo-alt"></i>
                </div>
            </div>
        </div>

        <div class="playlist" id="playlist">
            <div class="playlist-header" id="playlist-header">
                <div class="close-playlist" id="close-playlist-btn">
                    <i class="fas fa-times"></i>
                </div>
                <div class="playlist-title">🎵 DANH SÁCH BÀI HÁT 🎵</div>
                <div style="width: 40px;"></div> 
            </div>
            <div id="playlist-content"></div>
        </div>
    </div>

    <div id="timer-overlay" class="timer-overlay"></div>
    <div id="timer-modal" class="timer-modal">
        <i class="far fa-clock text-3xl mb-2 text-black"></i>
        <h3 class="text-lg font-bold uppercase tracking-widest">HẸN GIỜ TẮT</h3>
        <p id="timer-status" class="text-[10px] text-gray-400 font-bold uppercase mt-1">Chưa đặt hẹn giờ</p>
        <div class="mt-5 flex flex-col gap-3">
            <input type="number" id="timer-minutes" placeholder="Nhập số phút..." class="border p-3 rounded-lg text-center font-bold outline-none focus:border-black">
            <button id="start-timer-btn" class="bg-black text-white font-bold py-3 rounded-lg text-xs uppercase tracking-widest transition-all hover:bg-gray-800">BẮT ĐẦU</button>
            <button id="cancel-timer-btn" class="text-red-500 font-bold text-[10px] uppercase tracking-widest transition-all hover:text-red-600">HỦY HẸN GIỜ</button>
        </div>
        <button id="close-timer-modal" class="mt-4 text-gray-400 text-[10px] font-bold uppercase transition-all hover:text-gray-600">Đóng</button>
    </div>

    <audio id="audio-player" preload="auto" crossorigin="anonymous" playsinline></audio>

    <script src="js/music.js"></script>
</body>
</html>
