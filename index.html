<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/icon.png" rel="shortcut icon" type="image/x-icon" />
    <title>XuanKen Music Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: #fcfcfc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: #000;
            user-select: none;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        .player-container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .header-section {
            padding: 40px 24px 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            border-bottom: 1px solid #f0f0f0;
            position: relative;
        }

        .top-right-action, .top-left-action {
            position: absolute;
            top: 15px;
            z-index: 110;
        }
        .top-left-action { left: 15px; }
        .top-right-action { right: 15px; }

        .btn-icon {
            font-size: 1.2rem;
            cursor: pointer;
            color: #666;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.03);
        }

        .btn-icon:active { transform: scale(0.92); }
        .btn-icon.active { color: #000; background: rgba(0, 0, 0, 0.08); }

        .play-btn {
            background: #000;
            color: #fff !important;
            width: 55px;
            height: 55px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .play-btn:hover { transform: scale(1.08); background: #1a1a1a; }

        .album-art {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #eee;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 5px solid #fff;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: rotate 15s linear infinite;
            animation-play-state: paused;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-info-main { width: 100%; }

        .song-title {
            display: block;
            color: #000;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow-x: auto;
            max-width: 100%;
            line-height: 1.3;
            padding-bottom: 2px;
            scrollbar-width: thin;
        }
        .song-title::-webkit-scrollbar { height: 2px; }
        
        .artist-name {
            display: block;
            color: #777;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .lyric-container {
            min-height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0 10px;
        }

        .current-lyric {
            color: #333;
            text-align: center;
            white-space: nowrap;
            display: inline-block;
            transform-origin: center center;
        }

        .controls-bar { padding: 24px; background: #fff; }
        .progress-wrapper { margin-bottom: 20px; }

        .progress-bar-container {
            height: 6px;
            background: #f0f0f0;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-filled {
            height: 100%;
            background: #000;
            width: 0%;
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #999;
        }

        .main-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
        }

        .playlist {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 150;
            overflow-y: auto;
            transform: translateY(-100%);
            transition: transform 0.4s;
            display: flex;
            flex-direction: column;
        }

        .playlist.active { transform: translateY(0); }

        .playlist-header {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: #fff;
        }

        .close-playlist {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            cursor: pointer;
        }

        .playlist-title {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s;
        }
        .song-item:hover { background: rgba(0, 0, 0, 0.03); padding-left: 25px; }
        .song-item.active { background: #f5f5f5; border-left: 5px solid #000; }
        .song-item .item-title { font-size: 0.85rem; line-height: 1.3; word-break: break-word; }

        #interaction-hint {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom { animation: spin 1s linear infinite; }

        #toast-msg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .timer-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 500;
            display: none;
            width: 90%;
            max-width: 320px;
            transition: all 0.3s;
            opacity: 0;
            text-align: center;
        }
        .timer-modal.show {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        .timer-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 499;
            display: none;
        }

        @media (max-width: 480px) {
            .header-section { padding: 30px 16px 25px 16px; }
            .album-art { width: 140px; height: 140px; }
            .controls-bar { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="toast-msg"></div>

    <div id="interaction-hint">
        <div class="mb-4 border-4 border-gray-200 border-t-black rounded-full w-12 h-12 animate-spin-custom"></div>
        <p class="font-bold text-2xl text-center px-4 tracking-tighter">XUANKEN MUSIC OFFICIAL</p>
        <p class="text-gray-500 text-sm mt-2">✨ Chạm để bắt đầu nghe nhạc ✨</p>
    </div>

    <div class="player-container">
        <div class="header-section">
            <div class="top-left-action">
                <div class="btn-icon" id="open-timer-btn" title="Hẹn giờ tắt">
                    <i class="far fa-clock"></i>
                </div>
            </div>
            <div class="top-right-action">
                <div class="btn-icon" id="list-btn" title="Danh sách bài hát">
                    <i class="fas fa-list"></i>
                </div>
            </div>
            <div class="album-art">
                <img id="current-art" src="https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/logoofficial.png" alt="Art">
            </div>
            <div class="song-info-main">
                <span class="song-title" id="current-title">Sẵn sàng</span>
                <span class="artist-name" id="current-artist">XuanKen Official</span>
                <div class="lyric-container" id="lyric-container">
                    <div class="current-lyric" id="lyric-text">✨ Chọn bài hát để phát ✨</div>
                </div>
            </div>
        </div>

        <div class="controls-bar">
            <div class="progress-wrapper">
                <div class="progress-bar-container" id="progress-area">
                    <div class="progress-filled" id="progress-bar"></div>
                </div>
                <div class="time-info">
                    <span id="time-current">00:00</span>
                    <span id="time-total">00:00</span>
                </div>
            </div>
            <div class="main-actions">
                <div class="btn-icon" id="shuffle-btn" title="Phát ngẫu nhiên"><i class="fas fa-random"></i></div>
                <div class="btn-icon" id="prev-btn" title="Bài trước"><i class="fas fa-step-backward"></i></div>
                <div class="btn-icon play-btn" id="play-pause-btn" title="Phát / Tạm dừng"><i class="fas fa-play" id="play-icon"></i></div>
                <div class="btn-icon" id="next-btn" title="Bài tiếp"><i class="fas fa-step-forward"></i></div>
                <div class="btn-icon" id="repeat-btn" title="Lặp lại 1 bài"><i class="fas fa-redo-alt"></i></div>
            </div>
        </div>

        <div class="playlist" id="playlist">
            <div class="playlist-header">
                <div class="close-playlist" id="close-playlist-btn"><i class="fas fa-times"></i></div>
                <div class="playlist-title">🎵 DANH SÁCH BÀI HÁT 🎵</div>
                <div style="width: 40px;"></div>
            </div>
            <div id="playlist-content"></div>
        </div>
    </div>

    <div id="timer-overlay" class="timer-overlay"></div>
    <div id="timer-modal" class="timer-modal">
        <i class="far fa-clock text-3xl mb-2 text-black"></i>
        <h3 class="text-lg font-bold uppercase tracking-widest">HẸN GIỜ TẮT</h3>
        <p id="timer-status" class="text-[10px] text-gray-400 font-bold uppercase mt-1">Chưa đặt hẹn giờ</p>
        <div class="mt-5 flex flex-col gap-3">
            <input type="number" id="timer-minutes" placeholder="Nhập số phút..." class="border p-3 rounded-lg text-center font-bold outline-none focus:border-black">
            <button id="start-timer-btn" class="bg-black text-white font-bold py-3 rounded-lg text-xs uppercase tracking-widest">BẮT ĐẦU</button>
            <button id="cancel-timer-btn" class="text-red-500 font-bold text-[10px] uppercase tracking-widest">HỦY HẸN GIỜ</button>
        </div>
        <button id="close-timer-modal" class="mt-4 text-gray-400 text-[10px] font-bold uppercase">Đóng</button>
    </div>

    <audio id="audio-player" preload="auto" crossorigin="anonymous" playsinline></audio>

        function showToast(msg, isError = false) {
            toast.innerText = msg;
            toast.style.opacity = "1";
            if (isError) toast.style.background = "rgba(220, 38, 38, 0.9)";
            else toast.style.background = "rgba(0,0,0,0.85)";
            setTimeout(() => { 
                toast.style.opacity = "0";
                toast.style.background = "rgba(0,0,0,0.85)";
            }, 2500);
        }

        function formatTime(sec) {
            if (!sec || isNaN(sec)) return "00:00";
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function parseLRC(text) {
            const lines = text.split('\n');
            const result = [];
            const timeReg = /\[(\d+):(\d+\.\d+)\]/;
            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    result.push({
                        time: parseInt(match[1]) * 60 + parseFloat(match[2]),
                        text: line.replace(timeReg, '').trim()
                    });
                }
            });
            return result.sort((a, b) => a.time - b.time);
        }

        async function loadLyric(lrcUrl1, lrcUrl2) {
            if (lrcUrl1 && lrcUrl1 !== "") {
                try {
                    const res = await fetch(lrcUrl1);
                    if (res.ok) {
                        showToast("📝 Đã tải lời bài hát");
                        return parseLRC(await res.text());
                    }
                } catch(e) { console.log("GitHub LRC error:", e); }
            }
            
            if (lrcUrl2 && lrcUrl2 !== "") {
                try {
                    const res = await fetch(lrcUrl2);
                    if (res.ok) {
                        showToast("📝 Đã tải lời bài hát (Dropbox)");
                        return parseLRC(await res.text());
                    }
                } catch(e) { console.log("Dropbox LRC error:", e); }
            }
            
            lyricDisplay.innerText = "🎤 XuanKen Official 🎤";
            return [];
        }

        function autoScaleSongTitle() {
            if (!songTitleEl) return;
            const containerWidth = songTitleEl.parentElement?.clientWidth || 300;
            songTitleEl.style.fontSize = '1.4rem';
            songTitleEl.style.whiteSpace = 'nowrap';
            let fontSize = 1.4;
            while (songTitleEl.scrollWidth > containerWidth && fontSize > 0.7) {
                fontSize -= 0.05;
                songTitleEl.style.fontSize = fontSize + 'rem';
            }
            if (songTitleEl.scrollWidth > containerWidth && fontSize <= 0.7) {
                songTitleEl.style.whiteSpace = 'normal';
                songTitleEl.style.wordBreak = 'break-word';
                songTitleEl.style.fontSize = '0.75rem';
            }
        }

        function adjustLyricFontSize(text) {
            lyricDisplay.innerText = text;
            lyricDisplay.style.transform = 'none';
            lyricDisplay.style.fontSize = '16px';
            const containerWidth = lyricContainer.clientWidth;
            if (containerWidth <= 0) return;
            if (lyricDisplay.scrollWidth > containerWidth - 20) {
                const scale = (containerWidth - 20) / lyricDisplay.scrollWidth;
                lyricDisplay.style.transform = `scale(${Math.max(scale, 0.5)})`;
            } else {
                let fontSize = 16;
                while (lyricDisplay.scrollWidth < containerWidth - 30 && fontSize < 22) {
                    fontSize++;
                    lyricDisplay.style.fontSize = fontSize + 'px';
                }
            }
        }

        function getRandomPastel() {
            const h = Math.floor(Math.random() * 360);
            document.body.style.backgroundColor = `hsl(${h}, 70%, 94%)`;
            document.querySelector('.progress-filled').style.backgroundColor = `hsl(${h}, 60%, 40%)`;
            document.querySelector('.play-btn').style.backgroundColor = `hsl(${h}, 60%, 40%)`;
        }

        function initShuffle() {
            shuffleQueue = [...Array(songs.length).keys()];
            for (let i = shuffleQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffleQueue[i], shuffleQueue[j]] = [shuffleQueue[j], shuffleQueue[i]];
            }
            shuffleHistory = [];
        }

        function getNextShuffle() {
            if (shuffleQueue.length === 0) initShuffle();
            const next = shuffleQueue.shift();
            shuffleHistory.push(next);
            if (shuffleHistory.length > 10) shuffleHistory.shift();
            return next;
        }

        function getPrevShuffle() {
            if (shuffleHistory.length >= 2) {
                const prev = shuffleHistory[shuffleHistory.length - 2];
                shuffleHistory.pop();
                if (!shuffleQueue.includes(currentIndex)) {
                    shuffleQueue.unshift(currentIndex);
                }
                return prev;
            }
            return getNextShuffle();
        }

        function resetShuffleForCurrent(current) {
            initShuffle();
            const idx = shuffleQueue.indexOf(current);
            if (idx !== -1) shuffleQueue.splice(idx, 1);
            shuffleQueue.unshift(current);
            shuffleHistory = [current];
        }

        async function loadSong(index) {
            const song = songs[index];
            if (!song) return;
            
            songTitleEl.innerText = song.name;
            autoScaleSongTitle();
            getRandomPastel();
            
            currentAudioSource = 1;
            audio.pause();
            audio.src = song.audio1;
            audio.load();
            
            lyrics = await loadLyric(song.lrc1, song.lrc2);
            lastLyric = "";
            
            document.getElementById('time-current').innerText = "00:00";
            document.getElementById('time-total').innerText = "00:00";
            progressBar.style.width = '0%';
            
            renderPlaylist();
            
            if (playlistOverlay.classList.contains('active')) {
                setTimeout(() => {
                    const activeItem = document.querySelector('.song-item.active');
                    if (activeItem) {
                        playlistOverlay.scrollTop = activeItem.offsetTop - (playlistHeader?.offsetHeight || 0);
                    }
                }, 100);
            }
        }

        function changeSong(index) {
            currentIndex = index;
            loadSong(currentIndex).then(() => {
                audio.play().catch(e => console.log("Auto-play bị chặn:", e));
            });
        }

        function playNext() {
            if (isRepeatOne) {
                audio.currentTime = 0;
                audio.play();
                return;
            }
            let nextIndex;
            if (isShuffle) {
                nextIndex = getNextShuffle();
            } else {
                nextIndex = (currentIndex + 1) % songs.length;
            }
            changeSong(nextIndex);
        }

        function playPrev() {
            if (isRepeatOne) {
                audio.currentTime = 0;
                audio.play();
                return;
            }
            let prevIndex;
            if (isShuffle) {
                prevIndex = getPrevShuffle();
            } else {
                prevIndex = (currentIndex - 1 + songs.length) % songs.length;
            }
            changeSong(prevIndex);
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        function selectSongFromList(index) {
            playlistOverlay.classList.remove('active');
            if (isShuffle) resetShuffleForCurrent(index);
            changeSong(index);
        }

        audio.onplay = () => {
            isPlaying = true;
            playIcon.className = 'fas fa-pause';
            art.style.animationPlayState = 'running';
        };
        
        audio.onpause = () => {
            isPlaying = false;
            playIcon.className = 'fas fa-play';
            art.style.animationPlayState = 'paused';
        };
        
        audio.ontimeupdate = () => {
            const cur = audio.currentTime;
            const dur = audio.duration;
            if (dur) {
                progressBar.style.width = (cur / dur * 100) + '%';
                document.getElementById('time-current').innerText = formatTime(cur);
                document.getElementById('time-total').innerText = formatTime(dur);
            }
            if (lyrics.length > 0) {
                const active = [...lyrics].reverse().find(l => cur >= l.time);
                if (active && lastLyric !== active.text) {
                    lastLyric = active.text;
                    adjustLyricFontSize(active.text);
                }
            }
            if (isRepeatOne && dur && (dur - cur) <= 0.1 && !isLoopingHandled && dur > 0) {
                isLoopingHandled = true;
                audio.currentTime = 0;
                audio.play();
            }
            if (cur > 0 && dur && (dur - cur) > 0.2) isLoopingHandled = false;
        };
        
        audio.onended = () => {
            if (isRepeatOne) {
                isLoopingHandled = true;
                audio.currentTime = 0;
                setTimeout(() => audio.play(), 10);
            } else {
                playNext();
            }
        };
        
        audio.onerror = () => {
            const song = songs[currentIndex];
            if (currentAudioSource === 1 && song.audio2 && song.audio2 !== "") {
                currentAudioSource = 2;
                showToast("🔄 Đang chuyển sang link dự phòng (Dropbox)...", false);
                audio.src = song.audio2;
                audio.load();
                setTimeout(() => audio.play(), 500);
            } else {
                showToast("❌ Không thể phát bài hát! Chuyển bài tiếp theo...", true);
                setTimeout(() => playNext(), 1000);
            }
        };

        hint.onclick = () => {
            hint.style.display = 'none';
            initShuffle();
            currentIndex = getNextShuffle();
            loadSong(currentIndex).then(() => {
                audio.play().catch(e => console.log(e));
            });
        };
        
        document.getElementById('play-pause-btn').onclick = togglePlay;
        document.getElementById('next-btn').onclick = () => playNext();
        document.getElementById('prev-btn').onclick = () => playPrev();
        document.getElementById('list-btn').onclick = () => {
            playlistOverlay.classList.add('active');
            renderPlaylist();
        };
        document.getElementById('close-playlist-btn').onclick = () => playlistOverlay.classList.remove('active');
        
        shuffleBtn.onclick = () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active', isShuffle);
            if (isShuffle) {
                resetShuffleForCurrent(currentIndex);
                showToast("🔀 Đã bật phát ngẫu nhiên");
            } else {
                showToast("➡️ Đã tắt ngẫu nhiên, phát tuần tự");
            }
        };
        
        repeatBtn.onclick = () => {
            isRepeatOne = !isRepeatOne;
            repeatBtn.classList.toggle('active', isRepeatOne);
            isLoopingHandled = false;
            showToast(isRepeatOne ? "🔁 Đã bật lặp lại 1 bài" : "🔂 Đã tắt lặp lại");
        };
        
        document.getElementById('progress-area').onclick = (e) => {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        let sleepTimerId = null;
        let remain = 0;
        const openTimerBtn = document.getElementById('open-timer-btn');
        const timerModal = document.getElementById('timer-modal');
        const timerOverlayDiv = document.getElementById('timer-overlay');
        const timerStatus = document.getElementById('timer-status');
        const timerInput = document.getElementById('timer-minutes');
        const startTimerBtn = document.getElementById('start-timer-btn');
        const cancelTimerBtn = document.getElementById('cancel-timer-btn');
        const closeTimerBtn = document.getElementById('close-timer-modal');
        
        function toggleTimerModal() {
            if (timerModal.classList.contains('show')) {
                timerModal.classList.remove('show');
                setTimeout(() => timerOverlayDiv.style.display = 'none', 300);
            } else {
                timerOverlayDiv.style.display = 'block';
                setTimeout(() => timerModal.classList.add('show'), 10);
            }
        }
        
        function setTimer() {
            const mins = parseInt(timerInput.value);
            if (!mins || mins <= 0) {
                showToast("Vui lòng nhập số phút hợp lệ!");
                return;
            }
            cancelTimer();
            remain = mins * 60;
            updateTimerUI();
            sleepTimerId = setInterval(() => {
                remain--;
                updateTimerUI();
                if (remain <= 0) {
                    audio.pause();
                    cancelTimer();
                    showToast("⏰ Đã tự động tắt nhạc theo hẹn giờ!");
                }
            }, 1000);
            toggleTimerModal();
            openTimerBtn.classList.add('active');
            showToast(`⏰ Đã hẹn giờ tắt sau ${mins} phút`);
        }
        
        function cancelTimer() {
            if (sleepTimerId) clearInterval(sleepTimerId);
            sleepTimerId = null;
            remain = 0;
            timerStatus.innerText = "Chưa đặt hẹn giờ";
            openTimerBtn.classList.remove('active');
        }
        
        function updateTimerUI() {
            if (remain > 0) {
                const m = Math.floor(remain / 60);
                const s = remain % 60;
                timerStatus.innerText = `Sẽ tắt sau: ${m} phút ${s} giây`;
            }
        }
        
        openTimerBtn.onclick = toggleTimerModal;
        closeTimerBtn.onclick = toggleTimerModal;
        timerOverlayDiv.onclick = toggleTimerModal;
        startTimerBtn.onclick = setTimer;
        cancelTimerBtn.onclick = () => {
            cancelTimer();
            showToast("Đã hủy hẹn giờ");
        };

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderPlaylist() {
            const list = document.getElementById('playlist-content');
            if (!list) return;
            list.innerHTML = songs.map((s, i) => `
                <div class="song-item ${i === currentIndex ? 'active' : ''}" onclick="window.selectSongFromList(${i})">
                    <div class="flex-1">
                        <div class="item-title text-sm uppercase font-bold break-words pr-2">${escapeHtml(s.name)}</div>
                        <div class="text-xs text-gray-500"><i class="fas fa-microphone-alt"></i> XuanKen Official</div>
                    </div>
                    ${i === currentIndex ? '<i class="fas fa-music text-xs text-black"></i>' : ''}
                </div>
            `).join('');
        }

        window.selectSongFromList = selectSongFromList;
        window.addEventListener('resize', () => {
            if (lastLyric) adjustLyricFontSize(lastLyric);
            autoScaleSongTitle();
        });
        
        renderPlaylist();
        autoScaleSongTitle();
        shuffleBtn.classList.add('active');
    </script>
</body>
</html>
