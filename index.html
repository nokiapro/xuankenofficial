<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XuanKen Music Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap');
        
        :root {
            --accent-color: #000000;
            --bg-color: #fcfcfc;
            --border-color: #f0f0f0;
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: #000;
            user-select: none;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        .player-container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .header-section {
            padding: 40px 24px 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            transition: border-color 0.8s ease;
        }

        .top-right-action {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 110;
        }

        .album-art {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: #eee;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 5px solid #fff;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: rotate 15s linear infinite;
            animation-play-state: paused;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-info-main {
            width: 100%;
        }

        .song-title {
            display: block;
            color: #000;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            display: block;
            color: #777;
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .lyric-container {
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            width: 100%;
            padding: 0 10px;
        }

        .current-lyric {
            color: #333;
            font-size: 1.15rem;
            font-weight: 400;
            text-align: center;
            opacity: 1;
            transition: opacity 0.1s ease-in-out, font-size 0.2s ease;
            white-space: nowrap;
            display: inline-block;
            max-width: 100%;
        }

        .controls-bar {
            padding: 24px;
            background: #fff;
        }

        .progress-wrapper {
            margin-bottom: 20px;
        }

        .progress-bar-container {
            height: 6px;
            background: var(--border-color);
            cursor: pointer;
            position: relative;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: background-color 0.8s ease;
        }

        .progress-filled {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            border-radius: 10px;
            transition: width 0.1s linear, background-color 0.8s ease;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #999;
            font-weight: 400;
        }

        .main-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-icon {
            font-size: 1.2rem;
            cursor: pointer;
            color: #666;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: 0.2s;
        }

        .btn-icon:active { transform: scale(0.9); }
        .btn-icon.active { color: #000; background: rgba(0,0,0,0.05); }

        .play-btn {
            background: #000;
            color: #fff !important;
            width: 55px;
            height: 55px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .playlist {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 1);
            z-index: 150;
            overflow-y: auto;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .playlist.active { transform: translateY(0); }

        .playlist-header {
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 160;
        }

        .close-playlist {
            font-size: 1.2rem;
            cursor: pointer;
            color: #000;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        .playlist-title {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        #playlist-content {
            flex: 1;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .song-item:hover { background: #f9f9f9; }

        .song-item.active {
            background: var(--bg-color);
            border-left: 5px solid var(--accent-color);
        }

        #interaction-hint {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="interaction-hint">
        <div class="loader mb-4 border-4 border-gray-200 border-t-black rounded-full w-12 h-12 animate-spin"></div>
        <p class="font-bold text-2xl text-center px-4 tracking-tighter">XUANKEN MUSIC OFFICIAL</p>
        <p class="text-gray-500 text-sm mt-2">Chạm để bắt đầu nghe nhạc</p>
    </div>

    <div class="player-container">
        <div class="header-section">
            <div class="top-right-action">
                <div class="btn-icon" id="list-btn" title="Danh sách bài hát"><i class="fas fa-list"></i></div>
            </div>
            
            <div class="album-art">
                <img id="current-art" src="https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/logoofficial.png" alt="Art">
            </div>
            <div class="song-info-main">
                <span class="song-title" id="current-title">Sẵn sàng</span>
                <span class="artist-name" id="current-artist">XuanKen Official</span>
                <div class="lyric-container">
                    <div class="current-lyric" id="lyric-text">Chọn bài hát để phát</div>
                </div>
            </div>
        </div>

        <div class="controls-bar">
            <div class="progress-wrapper">
                <div class="progress-bar-container" id="progress-area">
                    <div class="progress-filled" id="progress-bar"></div>
                </div>
                <div class="time-info">
                    <span id="time-current">00:00</span>
                    <span id="time-total">00:00</span>
                </div>
            </div>

            <div class="main-actions">
                <div class="btn-icon" id="shuffle-btn" title="Phát ngẫu nhiên"><i class="fas fa-random"></i></div>
                <div class="btn-icon" id="prev-btn"><i class="fas fa-step-backward"></i></div>
                <div class="btn-icon play-btn" id="play-pause-btn"><i class="fas fa-play" id="play-icon"></i></div>
                <div class="btn-icon" id="next-btn"><i class="fas fa-step-forward"></i></div>
                <div class="btn-icon" id="repeat-btn" title="Lặp lại 1 bài"><i class="fas fa-redo-alt"></i><sub style="font-size: 10px; margin-left: -4px;">1</sub></div>
            </div>
        </div>

        <div class="playlist" id="playlist">
            <div class="playlist-header" id="playlist-header">
                <div class="close-playlist" id="close-playlist-btn"><i class="fas fa-times"></i></div>
                <div class="playlist-title">Danh sách bài hát</div>
                <div style="width: 40px;"></div> 
            </div>
            <div id="playlist-content"></div>
        </div>
    </div>

    <audio id="audio-player" preload="auto" crossorigin="anonymous" playsinline></audio>

    <script>
        const songs = [
            { title: "Ngày Em Vu Quy", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/NGAYEMVUQUY-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/NGAYEMVUQUY-LYRIC.lrc" },
            { title: "Thất Tình & Làm Bạn Anh Nhé", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/THATTINHLAMBANANHNHE-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/THATTINHLAMBANANHNHE-LYRIC.lrc" },
            { title: "Quên Nhau Đi Nhé", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/QUENNHAUDINHE-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/QUENNHAUDINHE-LYRIC.lrc" },
            { title: "Ánh Mắt Em", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/ANHMATEM-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/ANHMATEM-LYRIC.lrc" },
            { title: "Để Em Bên Người Khác", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/DEEMBENNGUOIKHAC-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/DEEMBENNGUOIKHAC-LYRIC.lrc" },
            { title: "Người Ở Lại Trong Tim", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/NGUOIOLAITRONGTIM-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/NGUOIOLAITRONGTIM-LYRIC.lrc" },
            { title: "Dính Em Mất Rồi", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/DINHEMMATROI-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/DINHEMMATROI-LYRIC.lrc" },
            { title: "Sau Cơn Mưa Là Nỗi Nhớ", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/SAUCONMUALANOINHO-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/SAUCONMUALANOINHO-LYRIC.lrc" },
            { title: "Người Ở Lại Giữa Mưa", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/NGUOIOLAIGIUAMUA-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/NGUOIOLAIGIUAMUA-LYRIC.lrc" },
            { title: "Giữa Hai Người Là Cô Đơn", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/GIUAHAINGUOILACODON-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/GIUAHAINGUOILACODON-LYRIC.lrc" },
            { title: "Chúng Ta Dừng Lại Ở Đây", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/CHUNGTADUNGLAIODAY-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/CHUNGTADUNGLAIODAY-LYRIC.lrc" },
            { title: "Đến Cuối Vẫn Là Anh", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/DENCUOIVANLAANH-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/DENCUOIVANLANH-LYRIC.lrc" },
            { title: "Về Quảng Ninh Với Tôi", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/VEQUANGNINHVOITOI-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/VEQUANGNINHVOITOI-LYRIC.lrc" },
            { title: "Anh Yêu Em Sai Thời Điểm", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/ANHYEUEMSAITHOIDIEM-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/ANHYEUEMSAITHOIDIEM-LYRIC.lrc" },
            { title: "Đợi Chờ Trong Hạnh Phúc", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/DOICHOTRONGHANHPHUC-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/DOICHOTRONGHANHPHUC-LYRIC.lrc" },
            { title: "Em Chỉ Là Bạn Thân", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/EMCHILABANTHAN-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/EMCHILABANTHAN-LYRIC.lrc" },
            { title: "Khi", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/KHI-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/KHI-LYRIC.lrc" },
            { title: "Chuyến Tàu Ly Biệt (V1)", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/CHUYENTAULYBIETV1-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/CHUYENTAULYBIETV1-LYRIC.lrc" },
            { title: "Chuyến Tàu Ly Biệt (V2)", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/CHUYENTAULYBIETV2-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/CHUYENTAULYBIETV2-LYRIC.lrc" },
            { title: "50 Năm Về Sau", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/50NAMVESAU-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/50NAMVESAU-LYRIC.lrc" },
            { title: "Phố Cũ Còn Em", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/PHOCUCONEM-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/PHOCUCONEM-LYRIC.lrc" },
            { title: "Phố Cũ Còn Anh", audio: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/musicofficial/PHOCUCONANH-XUANKEN.mp3", lrc: "https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/lyric/PHOCUCONANH-LYRIC.lrc" }
        ];

        let index = Math.floor(Math.random() * songs.length);
        let isPlaying = false;
        let isShuffle = true; 
        let isRepeatOne = false;
        let isChanging = false;
        let lyrics = [];
        let lastLyric = "";
        let wakeLock = null; 
        
        const audio = document.getElementById('audio-player');
        const playIcon = document.getElementById('play-icon');
        const art = document.getElementById('current-art');
        const lyricDisplay = document.getElementById('lyric-text');
        const lyricContainer = document.querySelector('.lyric-container');
        const progressBar = document.getElementById('progress-bar');
        const hint = document.getElementById('interaction-hint');
        
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const playlistOverlay = document.getElementById('playlist');
        const playlistHeader = document.getElementById('playlist-header');

        function getRandomPastel() {
            const h = Math.floor(Math.random() * 360);
            return {
                bg: `hsl(${h}, 70%, 94%)`,
                accent: `hsl(${h}, 60%, 40%)`
            };
        }

        function scrollToActiveTop() {
            const activeItem = document.querySelector('.song-item.active');
            if (activeItem) {
                const headerHeight = playlistHeader.offsetHeight;
                const targetScroll = activeItem.offsetTop - headerHeight;
                playlistOverlay.scrollTop = targetScroll;
            }
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    if (document.visibilityState === 'visible') {
                        wakeLock = await navigator.wakeLock.request('screen');
                        console.log('Wake Lock active');
                    }
                } catch (err) {
                    console.warn(`WakeLock Error: ${err.message}. Đây thường là do chính sách bảo mật của iframe.`);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                }).catch(() => {
                    wakeLock = null;
                });
            }
        }

        function updateMediaSession() {
            if ('mediaSession' in navigator) {
                const song = songs[index];
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: 'XuanKen Official',
                    album: 'XuanKen Music Collection',
                    artwork: [
                        { src: 'https://raw.githubusercontent.com/nokiapro/xuankenofficial/main/logoofficial.png', sizes: '512x512', type: 'image/png' }
                    ]
                });

                navigator.mediaSession.setActionHandler('play', () => audio.play());
                navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => prevSong());
                navigator.mediaSession.setActionHandler('nexttrack', () => handleNextAction());
                
                navigator.mediaSession.setActionHandler('seekbackward', (details) => {
                    audio.currentTime = Math.max(audio.currentTime - (details.seekOffset || 10), 0);
                });
                navigator.mediaSession.setActionHandler('seekforward', (details) => {
                    audio.currentTime = Math.min(audio.currentTime + (details.seekOffset || 10), audio.duration);
                });
            }
        }

        function adjustLyricFontSize(text) {
            lyricDisplay.style.fontSize = '1.15rem';
            lyricDisplay.innerText = text;
            const maxWidth = lyricContainer.clientWidth - 20;
            let currentFontSize = 1.15;
            while (lyricDisplay.offsetWidth > maxWidth && currentFontSize > 0.7) {
                currentFontSize -= 0.05;
                lyricDisplay.style.fontSize = currentFontSize + 'rem';
            }
        }

        function formatTime(sec) {
            if (!sec || isNaN(sec)) return "00:00";
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function parseLRC(text) {
            const lines = text.split('\n');
            const result = [];
            const timeReg = /\[(\d+):(\d+\.\d+)\]/;
            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    result.push({
                        time: parseInt(match[1]) * 60 + parseFloat(match[2]),
                        text: line.replace(timeReg, '').trim()
                    });
                }
            });
            return result;
        }

        async function fetchLyric(url) {
            try {
                const res = await fetch(url);
                if (res.ok) return parseLRC(await res.text());
            } catch (e) {}
            return [];
        }

        async function loadSong(i) {
            if (isChanging) return;
            isChanging = true;
            index = i;
            const song = songs[index];
            
            document.getElementById('current-title').innerText = song.title;
            
            const colors = getRandomPastel();
            document.documentElement.style.setProperty('--bg-color', colors.bg);
            document.documentElement.style.setProperty('--accent-color', colors.accent);

            audio.pause();
            audio.src = song.audio;
            audio.load();
            
            lyrics = [];
            lastLyric = "";
            adjustLyricFontSize("Đang tải...");
            progressBar.style.width = '0%';

            lyrics = await fetchLyric(song.lrc);
            if (lyrics.length === 0) adjustLyricFontSize("XuanKen Official");
            
            renderPlaylist();
            updateMediaSession();
            
            if (playlistOverlay.classList.contains('active')) {
                setTimeout(scrollToActiveTop, 100);
            }
            isChanging = false;
        }

        function togglePlay() {
            if (audio.paused) audio.play().catch(() => {});
            else audio.pause();
        }

        function changeSong(i) {
            loadSong(i).then(() => audio.play().catch(() => {}));
        }

        function selectSongFromList(i) {
            playlistOverlay.classList.remove('active');
            changeSong(i);
        }

        function handleNextAction() {
            if (isRepeatOne) {
                audio.currentTime = 0;
                audio.play();
            } else {
                let next;
                if (isShuffle) {
                    do { next = Math.floor(Math.random() * songs.length); } while (next === index && songs.length > 1);
                } else {
                    next = (index + 1) % songs.length;
                }
                changeSong(next);
            }
        }

        function prevSong() {
            let prev = isShuffle ? Math.floor(Math.random() * songs.length) : (index - 1 + songs.length) % songs.length;
            changeSong(prev);
        }

        audio.onplay = () => {
            isPlaying = true;
            playIcon.className = 'fas fa-pause';
            art.style.animationPlayState = 'running';
            requestWakeLock(); 
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "playing";
            }
        };

        audio.onpause = () => {
            isPlaying = false;
            playIcon.className = 'fas fa-play';
            art.style.animationPlayState = 'paused';
            releaseWakeLock(); 
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "paused";
            }
        };

        audio.ontimeupdate = () => {
            const cur = audio.currentTime;
            const dur = audio.duration;
            if (dur) {
                progressBar.style.width = (cur / dur * 100) + '%';
                document.getElementById('time-current').innerText = formatTime(cur);
                document.getElementById('time-total').innerText = formatTime(dur);
                
                if ('mediaSession' in navigator && 'setPositionState' in navigator.mediaSession) {
                    navigator.mediaSession.setPositionState({
                        duration: dur,
                        playbackRate: audio.playbackRate,
                        position: cur
                    });
                }
            }
            if (lyrics.length > 0) {
                const active = lyrics.findLast(l => cur >= l.time);
                if (active && lastLyric !== active.text) {
                    lastLyric = active.text;
                    adjustLyricFontSize(active.text);
                }
            }
        };

        audio.onended = handleNextAction;

        hint.onclick = () => {
            hint.style.display = 'none';
            changeSong(index);
        };

        document.getElementById('play-pause-btn').onclick = togglePlay;
        document.getElementById('next-btn').onclick = handleNextAction;
        document.getElementById('prev-btn').onclick = prevSong;

        document.getElementById('list-btn').onclick = (e) => {
            e.stopPropagation();
            playlistOverlay.classList.add('active');
            setTimeout(scrollToActiveTop, 450);
        };
        
        document.getElementById('close-playlist-btn').onclick = () => playlistOverlay.classList.remove('active');
        
        shuffleBtn.onclick = function() {
            isShuffle = !isShuffle;
            this.classList.toggle('active', isShuffle);
        };

        repeatBtn.onclick = function() {
            isRepeatOne = !isRepeatOne;
            this.classList.toggle('active', isRepeatOne);
        };

        document.getElementById('progress-area').onclick = (e) => {
            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        function renderPlaylist() {
            const list = document.getElementById('playlist-content');
            list.innerHTML = songs.map((s, i) => `
                <div class="song-item ${i === index ? 'active' : ''}" onclick="selectSongFromList(${i})">
                    <div class="flex-1">
                        <div class="item-title text-sm uppercase font-bold">${s.title}</div>
                        <div class="text-xs text-gray-500">XuanKen Official</div>
                    </div>
                    ${i === index ? '<i class="fas fa-volume-up text-xs text-black"></i>' : ''}
                </div>
            `).join('');
        }

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && !audio.paused) {
                await requestWakeLock();
            }
        });

        window.onload = () => {
            isShuffle = true;
            shuffleBtn.classList.add('active');
            renderPlaylist();
        };
        
        window.onresize = () => {
            if (lastLyric) adjustLyricFontSize(lastLyric);
        };
    </script>
</body>
</html>
